<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Daily Checklist</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --success: #22c55e;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        h2 { margin: 0; font-size: 1.25rem; letter-spacing: -0.025em; }
        
        .stats { font-size: 0.9rem; font-weight: bold; color: var(--accent); }
        
        .task-item { 
            display: flex; align-items: center; padding: 14px; margin-bottom: 8px;
            background: rgba(255,255,255,0.03); border-radius: 8px; transition: all 0.2s; cursor: pointer;
        }
        .task-item:hover { background: rgba(255,255,255,0.07); }
        
        input[type="checkbox"] { 
            width: 20px; height: 20px; margin-right: 15px; cursor: pointer;
            accent-color: var(--success);
        }
        
        .task-text { font-size: 0.95rem; line-height: 1.4; }
        .completed .task-text { text-decoration: line-through; opacity: 0.4; }
        
        .footer-info { margin-top: 1.5rem; font-size: 0.75rem; color: #64748b; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Daily Content Ops</h2>
        <div class="stats" id="progress">0/4 Done</div>
    </header>

    <div id="taskList"></div>

    <div class="footer-info">
        Resetting daily at midnight • Local Storage Active
    </div>
</div>

<script>
    // YOUR SPECIFIC TASKS
    const defaultTasks = [
        "Mind Exposed video schedule for tomorrow YouTube",
        "ThinkEdge video schedule for tomorrow YouTube",
        "QuickPrep Kitchen video schedule for today Facebook",
        "QuickPrep Kitchen video posted on today Instagram"
    ];

    let taskData = [];

    function init() {
        const saved = localStorage.getItem('creatorTasks');
        const lastReset = localStorage.getItem('lastResetDate');
        const today = new Date().toLocaleDateString();

        if (saved && lastReset === today) {
            taskData = JSON.parse(saved);
        } else {
            // New day or first time use
            taskData = defaultTasks.map(name => ({ name, completed: false }));
            localStorage.setItem('lastResetDate', today);
            save();
        }
        render();
    }

    function toggleTask(index) {
        taskData[index].completed = !taskData[index].completed;
        save();
        render();
    }

    function save() {
        localStorage.setItem('creatorTasks', JSON.stringify(taskData));
    }

    function render() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        
        let doneCount = 0;

        taskData.forEach((task, i) => {
            if(task.completed) doneCount++;
            
            const item = document.createElement('div');
            item.className = `task-item ${task.completed ? 'completed' : ''}`;
            item.innerHTML = `
                <input type="checkbox" ${task.completed ? 'checked' : ''}>
                <span class="task-text">${task.name}</span>
            `;
            item.onclick = () => toggleTask(i);
            list.appendChild(item);
        });

        document.getElementById('progress').innerText = `${doneCount}/${taskData.length} Done`;
    }

    init();
</script>

</body>
</html>
