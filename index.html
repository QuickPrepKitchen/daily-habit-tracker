<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Content Tracker</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --success: #22c55e;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 2rem; margin: 0; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        
        h2 { margin-top: 0; font-weight: 600; color: var(--accent); }
        
        /* Progress Bar */
        .progress-container { background: #334155; border-radius: 10px; height: 10px; margin: 20px 0; overflow: hidden; }
        #progressFill { background: var(--success); height: 100%; width: 0%; transition: width 0.4s ease; }

        .task-item { display: flex; align-items: center; padding: 15px; background: #334155; border-radius: 8px; margin-bottom: 10px; transition: transform 0.1s; cursor: pointer; }
        .task-item:active { transform: scale(0.98); }
        
        input[type="checkbox"] { margin-right: 15px; width: 20px; height: 20px; cursor: pointer; accent-color: var(--success); }
        .task-text { flex-grow: 1; font-size: 0.95rem; line-height: 1.4; }
        .completed { text-decoration: line-through; opacity: 0.4; }
        
        .reset-info { font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 20px; border-top: 1px solid #334155; pt: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daily Workflow</h2>
    
    <div class="progress-container">
        <div id="progressFill"></div>
    </div>

    <div id="taskList"></div>

    <div class="reset-info">
        Data clears at midnight • Auto-saves to browser
    </div>
</div>

<script>
    // YOUR SPECIFIC TASKS
    const defaultTasks = [
        "Mind Exposed video schedule for tomorrow YouTube",
        "QuickPrep Kitchen video schedule for tomorrow YouTube",
        "QuickPrep Kitchen video schedule for today Facebook",
        "QuickPrep Kitchen video posted on today Instagram",
        "QuickPrep Kitchen video schedule for today Pinterest"
    ];

    let taskData = JSON.parse(localStorage.getItem('contentTasks')) || 
                   defaultTasks.map(t => ({ name: t, done: false }));

    function checkReset() {
        const today = new Date().toDateString();
        const lastDate = localStorage.getItem('lastAccessDate');
        
        if (lastDate !== today) {
            taskData.forEach(t => t.done = false);
            localStorage.setItem('lastAccessDate', today);
            save();
        }
    }

    function render() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        
        let completedCount = 0;

        taskData.forEach((task, i) => {
            if(task.done) completedCount++;
            
            const item = document.createElement('div');
            item.className = 'task-item';
            item.innerHTML = `
                <input type="checkbox" ${task.done ? 'checked' : ''}>
                <span class="task-text ${task.done ? 'completed' : ''}">${task.name}</span>
            `;
            item.onclick = () => toggle(i);
            list.appendChild(item);
        });

        // Update Progress Bar
        const percent = (completedCount / taskData.length) * 100;
        document.getElementById('progressFill').style.width = percent + '%';
    }

    function toggle(index) {
        taskData[index].done = !taskData[index].done;
        save();
        render();
    }

    function save() {
        localStorage.setItem('contentTasks', JSON.stringify(taskData));
    }

    // Run on Load
    checkReset();
    render();
</script>

</body>
</html>
